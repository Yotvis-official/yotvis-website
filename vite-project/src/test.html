<!DOCTYPE html>
<html>
<head>
<style>
  body, html { margin: 0; padding: 0; height: 300vh; background: #ccc; }
  .hero-container { height: 200vh; position: relative; }
  .hero-sticky { position: sticky; top: 0; height: 100vh; background: #F5F5EA; overflow: hidden; }
  .nav { width: 90%; height: 64px; background: black; margin: 32px auto 0; border-radius: 32px; display: flex; align-items: center; }
  .logo { width: 150px; height: 40px; background: white; margin-left: 32px; border-radius: 20px;}
  .about { height: 100vh; background: #D3E4BF; }
</style>
</head>
<body>
  <div class="hero-container">
    <div class="hero-sticky" id="hero">
      <div class="nav">
        <div class="logo" id="logo">LOGO</div>
      </div>
      <h1 style="text-align:center; margin-top:20vh; font-size:4rem">Hero Section</h1>
    </div>
  </div>
  <div class="about">
    <h1 style="text-align:center; padding-top:20vh; font-size:4rem">About Section</h1>
  </div>

  <script>
    const hero = document.getElementById('hero');
    const logo = document.getElementById('logo');
    window.addEventListener('scroll', () => {
      // scroll progress for the 100vh of extra scrolling
      const progress = Math.min(1, Math.max(0, window.scrollY / window.innerHeight));
      
      const rect = logo.getBoundingClientRect();
      // compute origin only once at start (when progress is 0)
      if (progress === 0 && !hero.dataset.originSet) {
        hero.style.transformOrigin = `${rect.left + rect.width/2}px ${rect.top + rect.height/2}px`;
        hero.dataset.originSet = true;
      }
      
      // scale up to 50
      const scale = 1 + progress * 49;
      // fade out at the end
      const opacity = progress > 0.8 ? 1 - ((progress - 0.8) * 5) : 1;
      
      hero.style.transform = `scale(${scale})`;
      hero.style.opacity = opacity;
    });
  </script>
</body>
</html>
