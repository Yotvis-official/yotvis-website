<!doctype html>
<html lang="en" hreflang="en-IN">

<head>
  <meta charset="UTF-8" />
  <meta name="application-name" content="Yotvis" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="robots" content="index, follow" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
  <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

  <!-- Preload Critical Fonts -->
  <link rel="preload" href="/fonts/ClashDisplay-Variable.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/Nunito-Variable.woff2" as="font" type="font/woff2" crossorigin />
  <!-- Preload LCP Image -->
  <link rel="preload" as="image" href="/logo-600.webp" fetchpriority="high" />

  <!-- Geo Tags for Local SEO -->
  <meta name="geo.region" content="IN-TN" />
  <meta name="geo.placename" content="Chennai" />

  <!-- Primary Meta Tags -->
  <title data-rh="true">Yotvis — Building Digital Presence | Web Design & Development</title>
  <meta data-rh="true" name="description"
    content="Most businesses struggle to stand out online. Yotvis helps you build a stronger digital presence through branding, high-performance websites, AI automation, and cloud systems." />
  <meta data-rh="true" name="keywords"
    content="Yotvis, Web Design, Web Development, App Development, UI/UX Design, Branding, AI Automation, Cloud Solutions, Digital Agency" />
  <meta data-rh="true" name="author" content="Yotvis" />
  <link data-rh="true" rel="canonical" href="https://yotvis.com/" />

  <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
  <meta data-rh="true" property="og:type" content="website" />
  <meta data-rh="true" property="og:url" content="https://yotvis.com/" />
  <meta data-rh="true" property="og:site_name" content="Yotvis" />
  <meta data-rh="true" property="og:title" content="Yotvis — Building Digital Presence" />
  <meta data-rh="true" property="og:description"
    content="Most businesses struggle to stand out online. Yotvis helps you build a stronger digital presence through branding, high-performance websites, AI automation, and cloud systems." />
  <meta data-rh="true" property="og:image" content="https://yotvis.com/og-image.jpg" />
  <meta data-rh="true" property="og:image:width" content="1200" />
  <meta data-rh="true" property="og:image:height" content="630" />

  <!-- Twitter / X / Discord -->
  <meta data-rh="true" name="twitter:card" content="summary_large_image" />
  <meta data-rh="true" name="twitter:url" content="https://yotvis.com/" />
  <meta data-rh="true" name="twitter:title" content="Yotvis — Building Digital Presence" />
  <meta data-rh="true" name="twitter:description"
    content="Most businesses struggle to stand out online. Yotvis helps you build a stronger digital presence through branding, high-performance websites, AI automation, and cloud systems." />
  <meta data-rh="true" name="twitter:image" content="https://yotvis.com/og-image.jpg" />

  <!-- Google tag (gtag.js) - Analytics Deferred -->
  <script>
    setTimeout(() => {
      const script = document.createElement('script');
      script.async = true;
      script.src = "https://www.googletagmanager.com/gtag/js?id=G-V4PDR2N6C6";
      document.head.appendChild(script);

      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-V4PDR2N6C6');
    }, 3000);
  </script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #FFFFF3;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    }
    #root {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
